<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolariScreen Calculator</title>
    <style>
        :root {
            --bg-primary: #080d12;
            --green: #00ff88;
            --cyan: #00e5ff;
            --text: #c8d8e8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg-primary);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,136,0.03) 2px,
                rgba(0,255,136,0.03) 4px
            );
            pointer-events: none;
            animation: scan 8s linear infinite;
        }
        
        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }
        
        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
            max-width: 600px;
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--green), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--green);
        }
        
        p {
            margin-bottom: 2rem;
            color: var(--text);
            font-size: 1.1rem;
            opacity: 0.8;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--green), var(--cyan));
            color: var(--bg-primary);
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin: 0.5rem;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,255,136,0.3);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--cyan);
            border: 2px solid var(--cyan);
        }
        
        .btn-secondary:hover {
            background: rgba(0,229,255,0.1);
        }
        
        .stats {
            margin-top: 2rem;
            display: flex;
            justify-content: space-around;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .stat {
            background: rgba(0,255,136,0.05);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 8px;
            padding: 1rem;
            min-width: 120px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 1.5rem;
            color: var(--green);
            font-weight: bold;
            margin-bottom: 0.3rem;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text);
            opacity: 0.7;
        }
        
        .footer {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: var(--text);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🧮</div>
        <h1>SolariScreen Calculator</h1>
        <p>Système de devis professionnel avec génération PDF automatique</p>
        
        <a href="dashboard.html" class="btn" id="dashboardBtn">
            📊 Accéder au Dashboard
        </a>
        <br>
        <a href="calculateur.html" class="btn btn-secondary">
            🧮 Calculateur Direct
        </a>
        
        <!-- Live stats -->
        <div class="stats" id="statsContainer">
            <div class="stat">
                <div class="stat-number" id="totalDevis">-</div>
                <div class="stat-label">Devis Total</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="caTotal">-</div>
                <div class="stat-label">CA Total</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="enCours">-</div>
                <div class="stat-label">En Cours</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        SolariScreen © 2025 - Système de devis nouvelle génération
    </div>

    <script>
        // Load and display real-time stats
        function loadStats() {
            try {
                const devisData = JSON.parse(localStorage.getItem('solariscreen_devis') || '[]');
                const showDemo = localStorage.getItem('solariscreen_show_demo') !== 'false';
                
                // Sample demo data for stats when no real data
                const sampleDevis = [
                    { statut: 'signe', calculs: { total_ttc: 2416.80 } },
                    { statut: 'envoye_client', calculs: { total_ttc: 3850.25 } },
                    { statut: 'brouillon', calculs: { total_ttc: 2850.15 } }
                ];
                
                const allDevis = devisData.length === 0 && showDemo ? sampleDevis : devisData;
                
                // Calculate stats
                const total = allDevis.length;
                const ca = allDevis
                    .filter(d => d.statut === 'signe')
                    .reduce((sum, d) => sum + (d.calculs?.total_ttc || 0), 0);
                const enCours = allDevis
                    .filter(d => !['signe', 'refuse', 'annule'].includes(d.statut))
                    .length;
                
                // Update UI
                document.getElementById('totalDevis').textContent = total || '0';
                document.getElementById('caTotal').textContent = ca > 0 ? 
                    ca.toLocaleString('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }) : '0 €';
                document.getElementById('enCours').textContent = enCours || '0';
                
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('totalDevis').textContent = '0';
                document.getElementById('caTotal').textContent = '0 €';
                document.getElementById('enCours').textContent = '0';
            }
        }
        
        // Load stats on page load
        loadStats();
        
        // Refresh stats every 30 seconds
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
