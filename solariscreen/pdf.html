<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolariScreen — Génération PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg-primary:#080d12; --bg-card:#0d1520; --bg-panel:#111c2a;
      --green:#00ff88; --cyan:#00e5ff; --red:#ff4757; --orange:#ffa502;
      --text:#c8d8e8; --text-dim:#5a7a9a; --border:#1a3048;
      --font-mono:'JetBrains Mono',monospace; --font-display:'Orbitron',sans-serif;
      --scanline-opacity:0.03;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font-mono);background:var(--bg-primary);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,var(--scanline-opacity)) 2px,rgba(0,255,136,var(--scanline-opacity)) 4px);pointer-events:none;z-index:9999;animation:scan 10s linear infinite;}
    @keyframes scan{to{background-position:0 100%;}}
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:2.5rem;width:min(520px,92vw);position:relative;z-index:1;text-align:center;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:8px 8px 0 0;}

    .logo{font-family:var(--font-display);font-size:1.1rem;color:var(--green);letter-spacing:0.1em;margin-bottom:0.3rem;}
    .logo span{color:var(--cyan);}
    .subtitle{font-size:0.65rem;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2rem;}

    .status-icon{font-size:3rem;margin-bottom:1rem;display:block;}
    .status-title{font-family:var(--font-display);font-size:0.9rem;color:var(--green);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:0.5rem;}
    .status-msg{font-size:0.75rem;color:var(--text-dim);line-height:1.7;margin-bottom:1.5rem;}
    .status-msg strong{color:var(--text);}

    .progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:1.5rem;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));width:0%;transition:width 0.4s ease;border-radius:2px;}

    .devis-info{background:var(--bg-panel);border:1px solid var(--border);border-radius:6px;padding:0.8rem 1.2rem;margin-bottom:1.5rem;text-align:left;font-size:0.75rem;}
    .devis-info-row{display:flex;justify-content:space-between;padding:0.25rem 0;border-bottom:1px solid rgba(255,255,255,0.04);}
    .devis-info-row:last-child{border-bottom:none;}
    .di-label{color:var(--text-dim);}
    .di-val{color:var(--text);font-weight:600;}
    .di-val.green{color:var(--green);}

    .btn{font-family:var(--font-mono);font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.8rem 1.5rem;border-radius:4px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:0.5rem;border:1px solid;}
    .btn-primary{background:var(--green);color:var(--bg-primary);border-color:var(--green);font-weight:700;}
    .btn-primary:hover{background:transparent;color:var(--green);box-shadow:0 0 20px rgba(0,255,136,0.3);}
    .btn-outline{background:transparent;color:var(--text-dim);border-color:var(--border);}
    .btn-outline:hover{color:var(--green);border-color:var(--green);}
    .btn-cyan{background:var(--cyan);color:var(--bg-primary);border-color:var(--cyan);font-weight:700;}
    .btn-cyan:hover{background:transparent;color:var(--cyan);box-shadow:0 0 20px rgba(0,229,255,0.3);}
    .btn-group{display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;margin-top:0.5rem;}

    .error-box{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:6px;padding:1rem;color:var(--red);font-size:0.78rem;margin-bottom:1rem;text-align:left;}

    @keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.5}}
    .pulsing{animation:pulse2 1.2s infinite;}
  </style>
</head>
<body>
<div class="bg-grid"></div>

<div class="card" id="mainCard">
  <div class="logo">SolariScreen<span>://</span>PDF</div>
  <div class="subtitle">Générateur de devis professionnel</div>
  <span class="status-icon pulsing" id="statusIcon">⚙️</span>
  <div class="status-title" id="statusTitle">Préparation…</div>
  <div class="status-msg" id="statusMsg">Chargement des données du devis…</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="devis-info" id="devisInfo" style="display:none;"></div>
  <div id="errorBox"></div>
  <div class="btn-group" id="btnGroup" style="display:none;"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// UTILITAIRES
// ═══════════════════════════════════════════════════════════
function fmtEur(n) {
  return new Intl.NumberFormat('fr-BE', { minimumFractionDigits:2, maximumFractionDigits:2 }).format(n||0) + ' €';
}
function fmtDate(d) {
  if (!d) return new Date().toLocaleDateString('fr-BE');
  return new Date(d).toLocaleDateString('fr-BE', {day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtDateHeure(d) {
  if (!d) return new Date().toLocaleString('fr-BE');
  return new Date(d).toLocaleString('fr-BE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function setProgress(pct) { document.getElementById('progressFill').style.width = pct + '%'; }
function setStatus(icon, title, msg, pulsing=false) {
  document.getElementById('statusIcon').textContent = icon;
  document.getElementById('statusIcon').className = 'status-icon' + (pulsing?' pulsing':'');
  document.getElementById('statusTitle').textContent = title;
  document.getElementById('statusMsg').innerHTML = msg;
}
function showError(msg) {
  document.getElementById('errorBox').innerHTML = `<div class="error-box">❌ ${msg}</div>`;
  setStatus('❌','Erreur','Impossible de générer le PDF.');
  document.getElementById('btnGroup').innerHTML = `<a href="javascript:history.back()" class="btn btn-outline">← Retour</a>`;
  document.getElementById('btnGroup').style.display = 'flex';
}
function getTypeLabel(t) {
  return {screen:'Screen',tente_solaire:'Tente solaire',tablier_volet:'Tablier de volet'}[t]||'Screen';
}

// ═══════════════════════════════════════════════════════════
// GÉNÉRATION PDF
// ═══════════════════════════════════════════════════════════
async function generatePDF(devis) {
  const { jsPDF } = window.jspdf;

  const p2        = devis.pricing_v2 || {};
  const calc      = devis.calculs || {};
  const client    = devis.client || {};
  const adresse   = client.adresse || {};
  const items     = devis.items || [];
  const extras    = p2.extras || [];

  // ── Données client ──
  const clientNom    = `${client.prenom||''} ${client.nom||''}`.trim();
  const adresseStr   = [adresse.rue, adresse.numero, adresse.code_postal, adresse.ville].filter(Boolean).join(' ');
  const clientEmail  = client.email || '';
  const devisRef     = devis.id || '—';
  const devisDate    = fmtDate(devis.date_creation);
  const devisDateH   = fmtDateHeure(devis.date_modification || devis.date_creation);

  // ── Calculs (depuis calculs ou recalculé) ──
  const tvaPct       = calc.tva_pct || p2.tva_pct || 6;
  const acomptePct   = calc.acompte_pct || p2.acompte_pct || 30;

  const totalMaterielHT  = calc.total_catalog_ht  || items.reduce((s,i)=>(s+(i.prix_catalogue_ht||0)*(i.quantite||1)),0);
  const totalInstallHT   = calc.total_installation_ht || 0;
  const totalExtrasHT    = calc.total_extras_ht   || extras.reduce((s,e)=>s+(e.total_ht||0),0);
  const surplusHT        = calc.surplus_difficulte || p2.surplus_difficulte || 0;

  // Remise marge (si mode=autre et total_sellers < 23%)
  const sellers         = p2.material?.sellers || {};
  let remiseMargePct    = 0;
  if (sellers.mode === 'autre') {
    const totalS = (sellers.nicolas_pct||0) + (sellers.yannick_pct||0);
    if (totalS < 23) remiseMargePct = 23 - totalS;
  }
  const remiseMargeAmt  = totalMaterielHT * (remiseMargePct / 100);
  const totalHT         = calc.total_ht  || (totalMaterielHT - remiseMargeAmt + totalInstallHT + totalExtrasHT + surplusHT);
  const totalTVA        = calc.total_tva || (totalHT * tvaPct / 100);
  const totalTTC        = calc.total_ttc || (totalHT + totalTVA);
  const acompteMontant  = calc.acompte_montant || (totalTTC * acomptePct / 100);

  // ── Init jsPDF A4 ──
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const PW = 210, PH = 297;
  const ML = 15, MR = 15, MT = 15;
  const CW = PW - ML - MR; // 180mm
  let y = MT;

  // ── Helpers position ──
  function checkPageBreak(needed=20) {
    if (y + needed > PH - 20) { doc.addPage(); y = MT; }
  }
  function line(x1,y1,x2,y2,color=[200,200,200]) {
    doc.setDrawColor(...color); doc.line(x1,y1,x2,y2);
  }
  function setFont(style='normal', size=10, color=[0,0,0]) {
    doc.setFont('helvetica', style); doc.setFontSize(size); doc.setTextColor(...color);
  }
  function text(t, x, yy, opts={}) { doc.text(String(t), x, yy, opts); }

  // ══════════════════════════════════════
  // EN-TÊTE
  // ══════════════════════════════════════
  // Bande couleur en haut
  doc.setFillColor(0, 80, 40);
  doc.rect(0, 0, PW, 8, 'F');

  // Nom SolariScreen
  setFont('bold', 18, [0, 153, 80]);
  text('SolariScreen', ML, y + 14);

  // Infos société
  setFont('normal', 8, [60,60,60]);
  const infos = [
    'SysCore',
    'TVA : 1016.367.186',
    'Avenue de la Gare 60 · 1401 Nivelles',
    'BE82 7320 7855 2368',
    'www.solariscreen.be',
    'info@solariscreen.be · service@solariscreen.be'
  ];
  infos.forEach((inf, i) => { text(inf, ML, y + 22 + i * 4.5); });

  // Bloc HAROL (droite)
  const bx = PW - MR - 42;
  doc.setFillColor(255, 140, 0);
  doc.roundedRect(bx, y + 8, 42, 12, 2, 2, 'F');
  setFont('bold', 12, [255,255,255]);
  text('HAROL', bx + 21, y + 17, {align:'center'});

  // Bloc SOMFY
  doc.setFillColor(255,255,255);
  doc.setDrawColor(220,220,220);
  doc.roundedRect(bx, y + 23, 42, 12, 2, 2, 'FD');
  setFont('bold', 10, [0,100,180]);
  text('SOMFY', bx + 21, y + 32, {align:'center'});

  y += 50;

  // Ligne de séparation
  doc.setDrawColor(0,153,80); doc.setLineWidth(0.5);
  doc.line(ML, y, PW - MR, y); doc.setLineWidth(0.2);
  y += 8;

  // ══════════════════════════════════════
  // TITRE
  // ══════════════════════════════════════
  setFont('bold', 13, [20,20,20]);
  // Titre adapté selon type d'item
  const hasScreeen = items.some(i => i.type === 'screen' || !i.type);
  const hasTente   = items.some(i => i.type === 'tente_solaire');
  let titre = 'Devis – Fourniture et installation';
  if (hasTente && !hasScreeen) titre += ' de tente(s) solaire';
  else titre += ' de screen Harol CoolScreen8';
  text(titre, ML, y);
  y += 10;

  // ══════════════════════════════════════
  // INFOS CLIENT
  // ══════════════════════════════════════
  // Cadre fond gris très léger
  doc.setFillColor(248,248,248); doc.setDrawColor(220,220,220);
  doc.roundedRect(ML, y, CW, clientEmail ? 26 : 22, 2, 2, 'FD');
  y += 5;

  setFont('bold', 10, [40,40,40]);
  text('Client :', ML + 3, y);
  setFont('normal', 10, [20,20,20]);
  text(clientNom, ML + 22, y);

  setFont('bold', 10, [40,40,40]);
  text('Date :', PW - MR - 55, y);
  setFont('normal', 10, [20,20,20]);
  text(devisDate, PW - MR - 35, y);
  y += 6;

  setFont('bold', 10, [40,40,40]);
  text('Adresse chantier :', ML + 3, y);
  setFont('normal', 10, [20,20,20]);
  const adresseLines = doc.splitTextToSize(adresseStr || '—', 85);
  text(adresseLines[0] || '—', ML + 38, y);

  setFont('bold', 10, [40,40,40]);
  text('Référence :', PW - MR - 55, y);
  setFont('normal', 10, [20,20,20]);
  text(devisRef, PW - MR - 28, y);
  y += 6;

  if (clientEmail) {
    setFont('bold', 10, [40,40,40]);
    text('Mail :', ML + 3, y);
    setFont('normal', 10, [20,20,20]);
    text(clientEmail, ML + 18, y);
    y += 6;
  }
  y += 8;

  // ══════════════════════════════════════
  // SECTION 1 — DESCRIPTION
  // ══════════════════════════════════════
  checkPageBreak(30);
  setFont('bold', 13, [0,0,0]);
  text('1.  Description du matériel', ML, y);
  y += 6;

  setFont('bold', 10, [40,40,40]);
  text('- Description devis :', ML, y);
  y += 6;

  setFont('normal', 9.5, [30,30,30]);
  items.forEach(item => {
    checkPageBreak(12);
    const qty      = item.quantite || 1;
    const larg     = item.largeur  || 0;
    const haut     = item.hauteur  || 0;
    const surf     = larg>0&&haut>0 ? ((larg/1000)*(haut/1000)).toFixed(2) : '?';
    const typeL    = getTypeLabel(item.type);
    const moteur   = item.moteur && item.moteur !== 'Manuel' ? item.moteur : '';
    const empl     = item.emplacement || '';
    const prix     = item.prix_catalogue_ht || 0;

    let ligneBase = `•  ${typeL} - ${larg} × ${haut} mm (${surf} m²)`;
    if (qty > 1)    ligneBase += ` × ${qty}`;
    if (moteur)     ligneBase += ` - Moteur ${moteur}`;
    if (empl)       ligneBase += ` - Emplacement : ${empl}`;
    if (item.etage) ligneBase += ` - ${item.etage}`;
    if (prix > 0)   ligneBase += ` - ${fmtEur(prix)} HTVA`;

    const wrapped = doc.splitTextToSize(ligneBase, CW - 4);
    wrapped.forEach((wl, wi) => {
      checkPageBreak(8);
      text(wl, ML + (wi > 0 ? 8 : 2), y);
      y += 5;
    });

    // Notes item
    if (item.notes) {
      checkPageBreak(6);
      setFont('italic', 8.5, [100,100,100]);
      text(`    → ${item.notes}`, ML + 4, y);
      setFont('normal', 9.5, [30,30,30]);
      y += 4.5;
    }
  });

  y += 8;

  // ══════════════════════════════════════
  // SECTION 2 — PRIX
  // ══════════════════════════════════════
  checkPageBreak(60);
  setFont('bold', 13, [0,0,0]);
  text(`2.  Prix (TVA & ${tvaPct} %)`, ML, y);
  y += 7;

  // Tableau — colonnes
  const col = [ML, ML+92, ML+122, ML+152];
  const colW = [92, 30, 30, 28];
  const rowH = 7;

  // En-tête tableau
  doc.setFillColor(220,220,220); doc.setDrawColor(160,160,160);
  doc.rect(ML, y, CW, rowH, 'FD');
  setFont('bold', 9, [0,0,0]);
  text('Poste', col[0]+2, y+5);
  text('Prix HT', col[1]+colW[1]-2, y+5, {align:'right'});
  text(`TVA ${tvaPct}%`, col[2]+colW[2]-2, y+5, {align:'right'});
  text('Total TVAC', col[3]+colW[3]-2, y+5, {align:'right'});
  // lignes verticales en-tête
  [1,2,3].forEach(c => line(col[c], y, col[c], y+rowH, [160,160,160]));
  y += rowH;

  function tableRow(label, ht, isRemise=false, isBold=false, isFill=false) {
    checkPageBreak(rowH + 2);
    if (isFill) { doc.setFillColor(230,230,230); doc.rect(ML,y,CW,rowH,'FD'); }
    else { doc.setFillColor(255,255,255); doc.rect(ML,y,CW,rowH,'FD'); }
    doc.setDrawColor(200,200,200); doc.rect(ML,y,CW,rowH,'D');
    [1,2,3].forEach(c => line(col[c],y,col[c],y+rowH,[200,200,200]));

    const tva  = ht * (tvaPct/100);
    const ttc  = ht + tva;
    const sign = isRemise ? '-\u00A0' : '';
    const absHt= Math.abs(ht), absTva=Math.abs(tva), absTtc=Math.abs(ttc);

    setFont(isBold?'bold':'normal', 9, [0,0,0]);
    text(label, col[0]+2, y+5);
    setFont(isBold?'bold':'normal', 9, isRemise?[180,0,0]:[0,0,0]);
    text(sign+fmtEur(absHt),  col[1]+colW[1]-2, y+5, {align:'right'});
    text(sign+fmtEur(absTva), col[2]+colW[2]-2, y+5, {align:'right'});
    text(sign+fmtEur(absTtc), col[3]+colW[3]-2, y+5, {align:'right'});
    y += rowH;
  }

  tableRow('Fourniture matériel', totalMaterielHT);
  tableRow('Installation',        totalInstallHT);

  extras.forEach(ex => {
    tableRow(ex.label || 'Extra', ex.total_ht || 0);
  });

  if (surplusHT > 0)       tableRow('Surplus difficulté', surplusHT);
  if (remiseMargePct > 0)  tableRow(`Remise vendeurs -${remiseMargePct.toFixed(1)}%`, remiseMargeAmt, true);

  // Ligne Total (fond gris)
  tableRow('Total', totalHT, false, true, true);

  y += 8;

  // ══════════════════════════════════════
  // SECTION 3 — ACOMPTE
  // ══════════════════════════════════════
  checkPageBreak(30);
  setFont('bold', 13, [0,0,0]);
  text('3.  Acompte', ML, y);
  y += 7;

  setFont('normal', 11, [40,40,40]);
  text(`Un acompte de ${acomptePct} % est demandé à la commande.`, ML, y);
  y += 6;

  setFont('bold', 11, [0,100,50]);
  text(`Montant de l'acompte : ${fmtEur(acompteMontant)} TVAC`, ML, y);
  y += 12;

  // ══════════════════════════════════════
  // SECTION 4 — CONDITIONS
  // ══════════════════════════════════════
  checkPageBreak(40);
  setFont('bold', 13, [0,0,0]);
  text('4.  Conditions', ML, y);
  y += 7;

  const conditions = [
    '- Offre valable 2 mois',
    '- Délais de livraison selon disponibilité Harol (± 4 semaines)',
    `- Paiement : acompte de ${acomptePct} % à la commande, solde à la livraison`,
    '- Installation prévue par SolariScreen'
  ];
  setFont('normal', 10.5, [40,40,40]);
  conditions.forEach(c => {
    checkPageBreak(8);
    text(c, ML, y); y += 6;
  });

  y += 12;

  // ══════════════════════════════════════
  // SIGNATURE
  // ══════════════════════════════════════
  checkPageBreak(30);
  // Cadre signature à droite
  const sigX = PW - MR - 75;
  doc.setDrawColor(180,180,180);
  doc.roundedRect(sigX, y, 75, 28, 2, 2, 'D');
  setFont('bold', 9, [80,80,80]);
  text('Bon pour accord — Signature du client :', sigX + 37.5, y + 6, {align:'center'});
  // Ligne pointillée
  doc.setLineDashPattern([1,1], 0);
  doc.line(sigX + 5, y + 22, sigX + 70, y + 22);
  doc.setLineDashPattern([], 0);
  setFont('normal', 7.5, [150,150,150]);
  text('Date et signature précédées de « Lu et approuvé »', sigX + 37.5, y + 27, {align:'center'});

  // ══════════════════════════════════════
  // FOOTER (toutes pages)
  // ══════════════════════════════════════
  const totalPages = doc.getNumberOfPages();
  for (let p = 1; p <= totalPages; p++) {
    doc.setPage(p);

    // Bande verte bas
    doc.setFillColor(0,80,40);
    doc.rect(0, PH-8, PW, 8, 'F');

    // Texte footer
    setFont('normal', 7.5, [120,120,120]);
    text(`SolariScreen — Devis généré le ${devisDateH}`, ML, PH - 11);
    setFont('normal', 7.5, [120,120,120]);
    text(`Page ${p} / ${totalPages}`, PW - MR, PH - 11, {align:'right'});
  }

  return doc;
}

// ═══════════════════════════════════════════════════════════
// POINT D'ENTRÉE
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const autoDownload = params.get('auto') === '1';

  if (!id) { showError('Aucun ID de devis spécifié dans l\'URL.'); return; }

  setProgress(10);
  setStatus('⚙️', 'Chargement…', 'Lecture des données du devis…', true);

  await sleep(200);

  const all = JSON.parse(localStorage.getItem('solariscreen_devis') || '[]');
  const devis = all.find(d => d.id === id);

  if (!devis) { showError(`Devis <strong>#${id}</strong> introuvable dans les données locales.`); return; }

  // Afficher les infos
  const c = devis.client || {};
  const calc = devis.calculs || {};
  const p2 = devis.pricing_v2 || {};
  const clientNom = `${c.prenom||''} ${c.nom||''}`.trim() || '—';
  const items = devis.items || [];
  const tvaPct = calc.tva_pct || p2.tva_pct || 6;

  document.getElementById('devisInfo').innerHTML = `
    <div class="devis-info-row"><span class="di-label">Référence</span><span class="di-val green">#${id}</span></div>
    <div class="devis-info-row"><span class="di-label">Client</span><span class="di-val">${clientNom}</span></div>
    <div class="devis-info-row"><span class="di-label">Ouvertures</span><span class="di-val">${items.length}</span></div>
    <div class="devis-info-row"><span class="di-label">TVA</span><span class="di-val">${tvaPct}%</span></div>
    <div class="devis-info-row"><span class="di-label">Total TTC</span><span class="di-val green">${new Intl.NumberFormat('fr-BE',{style:'currency',currency:'EUR'}).format(calc.total_ttc||0)}</span></div>
  `;
  document.getElementById('devisInfo').style.display = 'block';
  setProgress(30);

  setStatus('📐', 'Construction…', 'Mise en page du document PDF…', true);
  await sleep(300);
  setProgress(60);

  try {
    const doc = await generatePDF(devis);
    setProgress(90);

    await sleep(200);
    setProgress(100);
    setStatus('✅', 'PDF prêt !', `Le devis <strong>#${id}</strong> — <strong>${clientNom}</strong> est prêt.`, false);

    const fileName = `Devis_SolariScreen_${id}_${(c.nom||'client').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`;

    if (autoDownload) {
      doc.save(fileName);
    }

    document.getElementById('btnGroup').innerHTML = `
      <button class="btn btn-primary" onclick="doc_${id.replace(/\W/g,'')}.save('${fileName}')">⬇️ Télécharger PDF</button>
      <a href="show.html?id=${id}" class="btn btn-outline">← Voir le devis</a>
      <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
    `;
    document.getElementById('btnGroup').style.display = 'flex';

    // Stocker doc dans window pour le bouton
    window[`doc_${id.replace(/\W/g,'')}`] = doc;

    // Toujours télécharger aussi
    doc.save(fileName);

  } catch(err) {
    console.error(err);
    showError(`Erreur lors de la génération : <br><code>${err.message}</code>`);
  }
});

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
