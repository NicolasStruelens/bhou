<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SolariScreen Dashboard — Gestion des Devis</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg-primary: #080d12;
  --bg-card: #0d1520;
  --bg-panel: #111c2a;
  --bg-hover: #1a2332;
  --green: #00ff88;
  --green-dim: #00cc6a;
  --green-dark: #003d22;
  --cyan: #00e5ff;
  --cyan-dim: #00b8d9;
  --red: #ff4757;
  --orange: #ffa502;
  --yellow: #ffdd59;
  --text: #c8d8e8;
  --text-dim: #5a7a9a;
  --text-muted: #3a5a7a;
  --border: #1a3048;
  --border-bright: #1e4060;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Orbitron', sans-serif;
  --shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
  --shadow-intense: 0 8px 32px rgba(0, 255, 136, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-primary);
  color: var(--text);
  font-family: var(--font-mono);
  overflow-x: hidden;
  min-height: 100vh;
}

/* Matrix scanlines effect */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.02) 2px, rgba(0,255,136,0.02) 4px);
  pointer-events: none; z-index: 9999;
  animation: scan 8s linear infinite;
}
@keyframes scan { to { background-position: 0 100%; } }

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(8,13,18,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
}

.header-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1400px;
  margin: 0 auto;
}

.logo-section {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.logo-container {
  width: 48px;
  height: 48px;
  background: var(--bg-card);
  border: 1px solid var(--green);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5em;
  position: relative;
  overflow: hidden;
}

.logo-container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--green), var(--cyan));
}

.brand-info h1 {
  font-family: var(--font-display);
  font-size: 1.4em;
  color: var(--green);
  margin: 0;
  letter-spacing: 0.1em;
}

.module-badge {
  font-size: 0.65em;
  color: var(--cyan);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.btn {
  font-family: var(--font-mono);
  font-size: 0.72em;
  padding: 0.6rem 1.2rem;
  border: 1px solid var(--border-bright);
  background: var(--bg-card);
  color: var(--text);
  text-decoration: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.btn-primary {
  background: var(--green);
  color: var(--bg-primary);
  border-color: var(--green);
  font-weight: 700;
}

.btn-primary:hover {
  background: transparent;
  color: var(--green);
  box-shadow: 0 0 20px rgba(0,255,136,0.3);
}

.btn:hover {
  border-color: var(--green);
  box-shadow: 0 4px 16px rgba(0,255,136,0.1);
  transform: translateY(-1px);
}

.btn-secondary {
  border-color: var(--cyan);
  color: var(--cyan);
}

.btn-secondary:hover {
  background: rgba(0,229,255,0.08);
  box-shadow: 0 0 16px rgba(0,229,255,0.2);
}

/* Main Container */
.main-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

/* Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.2rem;
  margin-bottom: 2rem;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  position: relative;
  overflow: hidden;
  transition: all 0.2s ease;
}

.stat-card:hover {
  border-color: var(--green);
  transform: translateY(-2px);
  box-shadow: var(--shadow-intense);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--green), var(--cyan));
  opacity: 0.6;
}

.stat-header {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 1rem;
}

.stat-icon {
  font-size: 1.5em;
}

.stat-title {
  font-family: var(--font-display);
  font-size: 0.75em;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 2em;
  color: var(--green);
  font-weight: 700;
  display: block;
  margin-bottom: 0.3rem;
}

.stat-subtitle {
  font-size: 0.7em;
  color: var(--text-muted);
}

/* Controls Panel */
.controls-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.2rem;
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}

.controls-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--green), var(--cyan));
  opacity: 0.6;
}

.controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.search-group {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  flex: 1;
  min-width: 280px;
}

.search-input {
  flex: 1;
  padding: 0.7rem 1rem;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.8em;
  transition: all 0.2s ease;
}

.search-input:focus {
  outline: none;
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
}

.search-input::placeholder {
  color: var(--text-muted);
}

.filter-select {
  padding: 0.7rem 1rem;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.8em;
  cursor: pointer;
  appearance: none;
  background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2300ff88"><path d="M7 10l5 5 5-5z"/></svg>');
  background-repeat: no-repeat;
  background-position: right 8px center;
  background-size: 16px;
  padding-right: 2.5rem;
}

.filter-select:focus {
  outline: none;
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
}

.actions-group {
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

/* Devis Table */
.table-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}

.table-container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--green), var(--cyan));
  opacity: 0.6;
}

.devis-table {
  width: 100%;
  border-collapse: collapse;
}

.devis-table thead {
  background: var(--bg-panel);
}

.devis-table th {
  padding: 1rem;
  text-align: left;
  font-family: var(--font-display);
  font-size: 0.65em;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: color 0.2s ease;
}

.devis-table th:hover {
  color: var(--green);
}

.devis-table th.sortable::after {
  content: '↕';
  position: absolute;
  right: 0.5rem;
  opacity: 0.3;
  transition: opacity 0.2s ease;
}

.devis-table th.sorted::after {
  opacity: 1;
  color: var(--green);
}

.devis-table th.sorted.asc::after { content: '↑'; }
.devis-table th.sorted.desc::after { content: '↓'; }

.devis-table td {
  padding: 1rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.2s ease;
}

.devis-table tbody tr {
  cursor: pointer;
  transition: all 0.2s ease;
}

.devis-table tbody tr:hover {
  background: var(--bg-hover);
}

.devis-table tbody tr:hover td {
  border-color: var(--border-bright);
}

.devis-id {
  font-family: var(--font-display);
  color: var(--green);
  font-weight: 600;
  font-size: 0.8em;
}

.devis-client {
  font-weight: 600;
  color: var(--text);
}

.devis-date {
  color: var(--text-dim);
  font-size: 0.8em;
}

.devis-amount {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--yellow);
  text-align: right;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.2rem 0.6rem;
  border-radius: 4px;
  font-size: 0.65em;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.status-brouillon { background: rgba(90,122,154,0.1); color: var(--text-dim); }
.status-a_tarifer { background: rgba(255,165,2,0.1); color: var(--orange); }
.status-envoye_client { background: rgba(0,229,255,0.1); color: var(--cyan); }
.status-signe { background: rgba(0,255,136,0.1); color: var(--green); }
.status-refuse { background: rgba(255,71,87,0.1); color: var(--red); }
.status-archive { background: rgba(90,122,154,0.1); color: var(--text-muted); }

.actions-cell {
  text-align: center;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin: 0 0.2rem;
  text-decoration: none;
  font-size: 0.8em;
}

.action-btn:hover {
  border-color: var(--green);
  color: var(--green);
  background: rgba(0,255,136,0.05);
}

.action-btn.edit:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(0,229,255,0.05);
}

.action-btn.delete:hover {
  border-color: var(--red);
  color: var(--red);
  background: rgba(255,71,87,0.05);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-muted);
}

.empty-state .icon {
  font-size: 3em;
  margin-bottom: 1rem;
  opacity: 0.3;
}

.empty-state h3 {
  font-family: var(--font-display);
  color: var(--text-dim);
  margin-bottom: 0.5rem;
}

.empty-state p {
  font-size: 0.8em;
  line-height: 1.6;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(4,8,12,0.95);
  backdrop-filter: blur(16px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.modal-overlay.open {
  opacity: 1;
  visibility: visible;
}

.modal-content {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: 8px;
  padding: 2rem;
  max-width: 90vw;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  transform: translateY(20px);
  transition: transform 0.3s ease;
}

.modal-overlay.open .modal-content {
  transform: translateY(0);
}

.modal-content::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--green), var(--cyan));
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 1.1em;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.2em;
  cursor: pointer;
  padding: 0.5rem;
  transition: color 0.2s ease;
}

.modal-close:hover {
  color: var(--green);
}

/* Detail View */
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
}

.detail-section {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1rem;
}

.detail-section h4 {
  font-family: var(--font-display);
  color: var(--cyan);
  font-size: 0.75em;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.8rem;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 0.4rem 0;
  border-bottom: 1px solid rgba(26,48,72,0.3);
  font-size: 0.8em;
}

.detail-row:last-child {
  border-bottom: none;
}

.detail-label {
  color: var(--text-dim);
}

.detail-value {
  color: var(--text);
  font-weight: 600;
}

.photos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 0.5rem;
  margin-top: 0.8rem;
}

.photo-thumb {
  aspect-ratio: 1;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s ease;
}

.photo-thumb:hover {
  border-color: var(--green);
  transform: scale(1.05);
}

.photo-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Responsive */
@media (max-width: 1024px) {
  .main-container {
    padding: 1rem;
  }
  
  .stats-grid {
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  }
  
  .controls-row {
    flex-direction: column;
    align-items: stretch;
  }
  
  .search-group {
    min-width: auto;
  }
  
  .detail-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 768px) {
  .header-content {
    flex-direction: column;
    gap: 1rem;
  }
  
  .devis-table {
    font-size: 0.9em;
  }
  
  .devis-table th,
  .devis-table td {
    padding: 0.5rem;
  }
  
  .modal-content {
    margin: 1rem;
    padding: 1.5rem;
  }
}

/* Loading state */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  color: var(--text-dim);
  gap: 0.8rem;
}

.loading::before {
  content: '';
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-content">
    <div class="logo-section">
      <div class="logo-container">🛡️</div>
      <div class="brand-info">
        <h1>SolariScreen</h1>
        <div class="module-badge">📊 Dashboard Devis</div>
      </div>
    </div>
    
    <div class="header-actions">
      <a href="calculateur.html" class="btn btn-primary">
        <span>+</span>
        Nouveau Devis
      </a>
      <button class="btn btn-secondary" onclick="importDevis()">
        <span>📂</span>
        Import JSON
      </button>
      <button class="btn" onclick="exportStats()">
        <span>📊</span>
        Export Stats
      </button>
    </div>
  </div>
</header>

<!-- Main Container -->
<div class="main-container">
  <!-- Stats Cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-header">
        <div class="stat-icon">💰</div>
        <div class="stat-title">Chiffre d'Affaires</div>
      </div>
      <div class="stat-value" id="statCA">0 €</div>
      <div class="stat-subtitle" id="statCASubtitle">Sur tous les devis signés</div>
    </div>
    
    <div class="stat-card">
      <div class="stat-header">
        <div class="stat-icon">📋</div>
        <div class="stat-title">Total Devis</div>
      </div>
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-subtitle" id="statTotalSubtitle">Tous statuts confondus</div>
    </div>
    
    <div class="stat-card">
      <div class="stat-header">
        <div class="stat-icon">⏳</div>
        <div class="stat-title">En Cours</div>
      </div>
      <div class="stat-value" id="statEnCours">0</div>
      <div class="stat-subtitle">À traiter / En attente</div>
    </div>
    
    <div class="stat-card">
      <div class="stat-header">
        <div class="stat-icon">✅</div>
        <div class="stat-title">Taux de Signature</div>
      </div>
      <div class="stat-value" id="statTaux">0%</div>
      <div class="stat-subtitle">Devis signés / Envoyés</div>
    </div>
  </div>
  
  <!-- Controls Panel -->
  <div class="controls-panel">
    <div class="controls-row">
      <div class="search-group">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Rechercher par client, ID ou notes..." onkeyup="filterDevis()">
        <select class="filter-select" id="statusFilter" onchange="filterDevis()">
          <option value="">Tous les statuts</option>
          <option value="brouillon">📝 Brouillon</option>
          <option value="a_tarifer">💰 À tarifer</option>
          <option value="en_attente_validation">⏳ En attente validation</option>
          <option value="envoye_client">📧 Envoyé client</option>
          <option value="signe">✅ Signé</option>
          <option value="refuse">❌ Refusé</option>
          <option value="archive">📦 Archivé</option>
        </select>
      </div>
      
      <div class="actions-group">
        <button class="btn" onclick="refreshData()">
          <span>🔄</span>
          Actualiser
        </button>
        <button class="btn" onclick="clearFilters()">
          <span>🗑️</span>
          Vider Filtres
        </button>
      </div>
    </div>
  </div>
  
  <!-- Devis Table -->
  <div class="table-container">
    <table class="devis-table">
      <thead>
        <tr>
          <th class="sortable" onclick="sortTable('id')">ID</th>
          <th class="sortable" onclick="sortTable('client')">Client</th>
          <th class="sortable" onclick="sortTable('date')">Date</th>
          <th class="sortable" onclick="sortTable('status')">Statut</th>
          <th class="sortable" onclick="sortTable('amount')">Montant</th>
          <th>Photos</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="devisTableBody">
        <!-- Content will be populated by JavaScript -->
      </tbody>
    </table>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-content" style="width: 900px;">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Détail du Devis</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    
    <div id="modalBody">
      <!-- Content will be populated by JavaScript -->
    </div>
    
    <div style="display: flex; gap: 1rem; margin-top: 1.5rem; justify-content: flex-end;">
      <button class="btn" onclick="editDevis(currentDevisId)">
        <span>✏️</span>
        Modifier
      </button>
      <button class="btn btn-secondary" onclick="duplicateDevis(currentDevisId)">
        <span>📋</span>
        Dupliquer
      </button>
      <button class="btn" onclick="generatePDF(currentDevisId)">
        <span>📄</span>
        Générer PDF
      </button>
    </div>
  </div>
</div>

<!-- File Input for Import -->
<input type="file" id="fileInput" accept=".json" style="display: none;" onchange="handleFileImport(event)">

<script>
// Global state
let devisList = [];
let filteredDevis = [];
let sortConfig = { key: 'date', direction: 'desc' };
let currentDevisId = null;

// Sample data for demonstration (in real app, this would come from backend)
const sampleDevis = [
  {
    id: "2025001542",

// Update statistics
function updateStats() {
  const total = devisList.length;
  const signes = devisList.filter(d => d.statut === 'signe');
  const envoyes = devisList.filter(d => ['envoye_client', 'relance_1', 'relance_2', 'relance_3'].includes(d.statut));
  const enCours = devisList.filter(d => ['brouillon', 'a_tarifer', 'en_attente_validation'].includes(d.statut));
  
  const totalCA = signes.reduce((sum, d) => sum + (d.calculs?.total_ttc || 0), 0);
  const tauxSignature = envoyes.length > 0 ? Math.round((signes.length / envoyes.length) * 100) : 0;
  
  // Update UI
  document.getElementById('statCA').textContent = formatEuro(totalCA);
  document.getElementById('statCASubtitle').textContent = `Sur ${signes.length} devis signés`;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statTotalSubtitle').textContent = `Tous statuts confondus`;
  document.getElementById('statEnCours').textContent = enCours.length;
  document.getElementById('statTaux').textContent = `${tauxSignature}%`;
}

// Filter devis
function filterDevis() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  
  filteredDevis = devisList.filter(devis => {
    const matchesSearch = !searchTerm || 
      devis.id.toLowerCase().includes(searchTerm) ||
      `${devis.client?.prenom || ''} ${devis.client?.nom || ''}`.toLowerCase().includes(searchTerm) ||
      devis.client?.adresse?.ville?.toLowerCase().includes(searchTerm);
      
    const matchesStatus = !statusFilter || devis.statut === statusFilter;
    
    return matchesSearch && matchesStatus;
  });
  
  renderTable();
}

// Sort table
function sortTable(key) {
  const direction = sortConfig.key === key && sortConfig.direction === 'asc' ? 'desc' : 'asc';
  sortConfig = { key, direction };
  
  // Update UI indicators
  document.querySelectorAll('.devis-table th').forEach(th => {
    th.classList.remove('sorted', 'asc', 'desc');
  });
  
  const clickedTh = event.target;
  clickedTh.classList.add('sorted', direction);
  
  // Sort data
  filteredDevis.sort((a, b) => {
    let aVal, bVal;
    
    switch(key) {
      case 'id':
        aVal = a.id;
        bVal = b.id;
        break;
      case 'client':
        aVal = `${a.client?.prenom || ''} ${a.client?.nom || ''}`;
        bVal = `${b.client?.prenom || ''} ${b.client?.nom || ''}`;
        break;
      case 'date':
        aVal = new Date(a.date_modification);
        bVal = new Date(b.date_modification);
        break;
      case 'status':
        aVal = a.statut;
        bVal = b.statut;
        break;
      case 'amount':
        aVal = a.calculs?.total_ttc || 0;
        bVal = b.calculs?.total_ttc || 0;
        break;
      default:
        return 0;
    }
    
    if (aVal < bVal) return direction === 'asc' ? -1 : 1;
    if (aVal > bVal) return direction === 'asc' ? 1 : -1;
    return 0;
  });
  
  renderTable();
}

}

// Generate PDF function
async function generatePDF(devisId) {
  console.log(`📄 Generating PDF for devis ${devisId}...`);
  
  const devis = devisList.find(d => d.id === devisId);
  if (!devis) {
    alert('Devis non trouvé');
    return;
  }
  
  // Show loading
  const loadingDiv = document.createElement('div');
  loadingDiv.innerHTML = `
    <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); 
         display: flex; align-items: center; justify-content: center; z-index: 10000; color: white; font-family: monospace;">
      <div style="text-align: center;">
        <div style="font-size: 2em; margin-bottom: 1rem;">📄</div>
        <div>Génération PDF en cours...</div>
        <div style="font-size: 0.8em; margin-top: 0.5rem; color: #00ff88;">${devis.client.prenom} ${devis.client.nom}</div>
      </div>
    </div>
  `;
  document.body.appendChild(loadingDiv);
  
  try {
    // Generate HTML content with SolariScreen template layout
    const htmlContent = generateDevisHTML(devis);
    
    // Convert to PDF with exact template formatting
    const opt = {
      margin: [10, 10, 10, 10], // top, left, bottom, right in mm
      filename: `Devis_SolariScreen_${devis.id}_${devis.client.prenom}_${devis.client.nom}.pdf`,
      image: { type: 'jpeg', quality: 0.92 },
      html2canvas: { 
        scale: 2, 
        useCORS: true,
        letterRendering: true,
        width: 794, // A4 width in pixels at 96dpi
        height: 1123 // A4 height in pixels at 96dpi
      },
      jsPDF: { 
        unit: 'mm', 
        format: 'a4', 
        orientation: 'portrait',
        compress: true
      }
    };
    
    // Generate and download PDF
    await html2pdf().from(htmlContent).set(opt).save();
    
    console.log('✅ PDF generated successfully');
    
  } catch (error) {
    console.error('❌ Error generating PDF:', error);
    alert('Erreur lors de la génération du PDF: ' + error.message);
  } finally {
    // Remove loading
    document.body.removeChild(loadingDiv);
  }
}

// Get photos HTML section if photos exist
function getPhotosHTML(devis) {
  if (!devis.items || devis.metadata?.photos_count === 0) return '';
  
  let photosHTML = '';
  let hasPhotos = false;
  
  // Collect all photos from all items
  const allPhotos = [];
  devis.items.forEach((item, index) => {
    if (item.photos && item.photos.length > 0) {
      item.photos.forEach(photo => {
        allPhotos.push({
          src: photo,
          caption: `Item ${index + 1}: ${getItemTypeText(item.type)} - ${item.details?.emplacement || 'Sans emplacement'}`
        });
        hasPhotos = true;
      });
    }
  });
  
  if (hasPhotos && allPhotos.length > 0) {
    photosHTML = `
      <div style="margin-bottom: 20px; text-align: center;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin: 10px 0;">
          ${allPhotos.slice(0, 3).map(photo => `
            <div style="border: 1px solid #ddd; border-radius: 4px; overflow: hidden;">
              <img src="${photo.src}" style="width: 100%; height: 120px; object-fit: cover;" alt="Photo projet"/>
              <div style="padding: 4px; font-size: 9px; background: #f8f8f8; text-align: center;">${photo.caption}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  return photosHTML;
}

// Get item type text for display
function getItemTypeText(type) {
  const types = {
    'screen': 'Screen',
    'volet': 'Volet',
    'store': 'Store',
    'pergola': 'Pergola',
    'brise_vue': 'Brise-vue',
    'cloison': 'Cloison',
    'tente_solaire': 'Tente solaire'
  };
  return types[type] || 'Screen';
}
function deleteDevis(id) {
  if (!confirm('Êtes-vous sûr de vouloir supprimer ce devis ?')) return;
  
  devisList = devisList.filter(d => d.id !== id);
  filteredDevis = filteredDevis.filter(d => d.id !== id);
  
  // Update localStorage
  const savedDevis = devisList.filter(d => !sampleDevis.find(s => s.id === d.id));
  localStorage.setItem('solariscreen_devis', JSON.stringify(savedDevis));
  
  updateStats();
  renderTable();
  
  alert('Devis supprimé avec succès');
}

// Modal functions
function openModal() {

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');

// Import devis
function importDevis() {
  document.getElementById('fileInput').click();
}

function handleFileImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const devisData = JSON.parse(e.target.result);
      
      // Validate basic structure
      if (!devisData.id || !devisData.client) {
        throw new Error('Format de devis invalide');
      }
      
      // Check if ID already exists
      if (devisList.find(d => d.id === devisData.id)) {
        if (!confirm('Un devis avec cet ID existe déjà. Remplacer ?')) return;
        devisList = devisList.filter(d => d.id !== devisData.id);
      }
      
      // Add to list
      devisList.unshift(devisData);
      filteredDevis = [...devisList];
      
      // Save to localStorage
      const savedDevis = devisList.filter(d => !sampleDevis.find(s => s.id === d.id));
      localStorage.setItem('solariscreen_devis', JSON.stringify(savedDevis));
      
      updateStats();
      renderTable();
      
      alert('Devis importé avec succès !');
      
    } catch (error) {
      alert('Erreur lors de l\'import : ' + error.message);
    }
  };
  
  reader.readAsText(file);
  
  // Reset file input
  event.target.value = '';
}

// Export stats
function exportStats() {
  const stats = {
    date_export: new Date().toISOString(),
    total_devis: devisList.length,
    ca_total: devisList.filter(d => d.statut === 'signe').reduce((sum, d) => sum + (d.calculs?.total_ttc || 0), 0),
    repartition_statuts: {},
    devis_par_mois: {}
  };
  
  // Count by status
  devisList.forEach(devis => {
    stats.repartition_statuts[devis.statut] = (stats.repartition_statuts[devis.statut] || 0) + 1;
  });
  
  // Export as JSON
  const blob = new Blob([JSON.stringify(stats, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `solariscreen-stats-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Utility functions
function formatEuro(amount) {
  return new Intl.NumberFormat('fr-BE', {
    style: 'currency',
    currency: 'EUR',
    minimumFractionDigits: 2
  }).format(amount || 0);
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const date = new Date(dateStr);
  return date.toLocaleDateString('fr-BE', {
    day: '2-digit',
    month: '2-digit', 
    year: 'numeric'
  });
}

function getStatusText(status) {
  const statusMap = {
    'brouillon': '📝 Brouillon',
    'a_tarifer': '💰 À tarifer',
    'en_attente_validation': '⏳ En attente validation',
    'envoye_client': '📧 Envoyé client',
    'relance_1': '🔔 Relance 1',
    'relance_2': '🔔 Relance 2', 
    'relance_3': '🔔 Relance 3',
    'signe': '✅ Signé',
    'refuse': '❌ Refusé',
    'archive': '📦 Archivé',
    'annule': '🚫 Annulé',
    'en_production': '🏭 En production'
  };
  return statusMap[status] || status;
}

function generateNewId() {
  const year = new Date().getFullYear();
  const timestamp = Date.now();
  const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
  return `${year}${timestamp.toString().slice(-3)}${random}`;
}

function showPhotoFullscreen(photoSrc) {
  // Create fullscreen photo viewer
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position: fixed; inset: 0; z-index: 20000;
    background: rgba(0,0,0,0.95); display: flex;
    align-items: center; justify-content: center; cursor: pointer;
  `;
  
  const img = document.createElement('img');
  img.src = photoSrc;
  img.style.cssText = `
    max-width: 95vw; max-height: 95vh; object-fit: contain;
    border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
  `;
  
  overlay.appendChild(img);
  document.body.appendChild(overlay);
  
  overlay.onclick = () => document.body.removeChild(overlay);
  
  // Close on Escape
  const handleKeydown = (e) => {
    if (e.key === 'Escape') {
      document.body.removeChild(overlay);
      document.removeEventListener('keydown', handleKeydown);
    }
  };
  document.addEventListener('keydown', handleKeydown);
}
